name: refill-db
# 毎月1日 9:00 JST(=0:00 UTC)にネタDBへ新しいお題を自動補充
on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: meguru-state
  cancel-in-progress: false

jobs:
  refill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -q -r requirements.txt
      - name: Refill topic DB
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/refill_db.py
      - name: Commit DB
        run: |
          git config user.name "meguru-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/neta_db.json || true
          git diff --cached --quiet || git commit -m "refill topic db"
          git push
